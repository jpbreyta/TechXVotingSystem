<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tech X | Official Voting Portal</title>
    <link rel="icon" type="image/png" href="imgs/logo_with_border.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css" />
    <style>
      .logo-glow { filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.6)); }
      .cluster-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(71, 85, 105, 0.5); backdrop-filter: blur(10px); transition: all 0.3s ease; }
      .cluster-card:hover { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.1); }
      .vote-slot { width: 12px; height: 12px; border-radius: 50%; background: #475569; display: inline-block; margin-right: 4px; }
      .vote-slot.active { background: #3b82f6; box-shadow: 0 0 8px #3b82f6; }
      button:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
      .booth-card.selected { border-color: #3b82f6 !important; background-color: rgba(59, 130, 246, 0.1) !important; }
    </style>
  </head>
  <body class="bg-slate-900 text-white min-h-screen p-4 md:p-8">
    <form id="voteForm" class="max-w-6xl mx-auto flex flex-col gap-8">
      <header class="text-center space-y-2">
        <div class="flex justify-end mb-4">
          <button type="button" onclick="showHelp()" class="flex items-center gap-2 text-slate-400 hover:text-blue-400 transition text-sm font-bold uppercase tracking-widest">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            How to Vote
          </button>
        </div>
        <img src="imgs/colored_logo.png" alt="TechIS Logo" class="h-20 mx-auto logo-glow" />
        <h1 class="text-4xl font-black text-blue-500 tracking-tighter italic">TECH X 2026</h1>
        <p class="text-xs text-slate-400 uppercase tracking-[0.4em] font-bold">Official Digital Voting Portal</p>
      </header>

      <div class="max-w-xl mx-auto w-full bg-slate-800/80 p-6 rounded-2xl border border-slate-700 shadow-xl">
        <label class="text-[10px] text-blue-400 font-black uppercase tracking-widest block mb-3">Student Identifier (SR-Code)</label>
        <input id="srCode" type="text" placeholder="e.g. 23-12345" required class="w-full px-5 py-4 rounded-xl bg-slate-900/50 border border-slate-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none font-mono text-xl transition-all shadow-inner" />
      </div>

      <div class="grid lg:grid-cols-2 gap-8">
        <div class="cluster-card p-8 rounded-3xl flex flex-col" data-cluster="A">
          <div class="flex justify-between items-start mb-6">
            <div>
              <h2 class="text-2xl font-black text-white uppercase tracking-tight">Cluster A</h2>
              <p class="text-xs text-slate-400 font-medium">2 Presentation • 3 Pitching</p>
            </div>
            <div class="slots flex p-2 bg-slate-900/50 rounded-lg">
              <div class="vote-slot"></div><div class="vote-slot"></div>
              <span class="mx-1 border-r border-slate-700"></span>
              <div class="vote-slot"></div><div class="vote-slot"></div><div class="vote-slot"></div>
            </div>
          </div>
          <div id="clusterA" class="grid grid-cols-2 sm:grid-cols-3 gap-3 min-h-[200px] content-start"></div>
        </div>

        <div class="cluster-card p-8 rounded-3xl flex flex-col" data-cluster="B">
          <div class="flex justify-between items-start mb-6">
            <div>
              <h2 class="text-2xl font-black text-white uppercase tracking-tight">Cluster B</h2>
              <p class="text-xs text-slate-400 font-medium">2 Presentation • 3 Pitching</p>
            </div>
            <div class="slots flex p-2 bg-slate-900/50 rounded-lg">
              <div class="vote-slot"></div><div class="vote-slot"></div>
              <span class="mx-1 border-r border-slate-700"></span>
              <div class="vote-slot"></div><div class="vote-slot"></div><div class="vote-slot"></div>
            </div>
          </div>
          <div id="clusterB" class="grid grid-cols-2 sm:grid-cols-3 gap-3 min-h-[200px] content-start"></div>
        </div>
      </div>

      <div class="flex flex-col gap-4 max-w-2xl mx-auto w-full">
        <button id="submitBtn" type="submit" disabled class="w-full bg-blue-600 hover:bg-blue-500 py-6 rounded-2xl font-black uppercase tracking-[0.2em] text-sm shadow-2xl shadow-blue-900/40 transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:grayscale">Cast Official Votes</button>
      </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/database.js"></script>
    <script src="js/vote.js"></script>
    <script src="js/security.js"></script>
    <script src="js/loader.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const srInput = document.getElementById("srCode");
        const submitBtn = document.getElementById("submitBtn");
        const srPattern = /^\d{2}-\d{5}$/;

        const validateFormState = () => {
          const srCode = srInput.value.trim();
          const isSrValid = srPattern.test(srCode) && !srCode.startsWith("24-");
          let isVotesValid = window.state && window.state.A.length === 5 && window.state.B.length === 5;
          
          if (isSrValid && isVotesValid) {
            submitBtn.disabled = false;
            submitBtn.classList.remove("opacity-50", "grayscale");
          } else {
            submitBtn.disabled = true;
            submitBtn.classList.add("opacity-50", "grayscale");
          }
        };

        srInput.addEventListener("input", (e) => {
          let val = e.target.value.replace(/\D/g, "");
          if (val.length > 2) val = val.substring(0, 2) + "-" + val.substring(2, 7);
          e.target.value = val.substring(0, 8);
          validateFormState();
        });

        window.addEventListener("voteUpdated", validateFormState);
        validateFormState();
      });
    </script>
  </body>
</html>
